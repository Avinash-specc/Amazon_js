<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 206 63" width="206" height="63">
  <title>Amazon logo</title>

  <!-- amazon text using the actual Amazon font proportions -->
  <!-- Using a bold condensed sans-serif style text approach with paths -->

  <!-- "amazon" wordmark -->
  <text x="3" y="44"
    font-family="Arial Black, Arial, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="-1">amazon</text>

  <!-- Orange smile arrow: from under 'a' to under 'n', curving down -->
  <path d="M8 52 Q60 68 120 58 Q150 53 163 50"
        stroke="#FF9900"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>
  <!-- Arrowhead at end of smile -->
  <path d="M157 46 L165 51 L158 57"
        stroke="#FF9900"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- .com text -->
  <text x="167" y="44"
    font-family="Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#FFFFFF">.com</text>
</svg>